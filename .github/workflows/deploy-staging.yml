name: Deploy to staging

# Sprint 1.1.3 — Staging deployment pipeline. Cloud provider locked
# (ADR 012: AWS, ap-south-1). Builds the api-server image
# (apps/api-server/Dockerfile), pushes it to ECR, and lets App Runner's
# auto_deployments_enabled (infra/terraform/apprunner.tf) pick up the new
# image digest automatically — no separate "trigger deployment" API call
# needed.
#
# Gated on repository secrets existing (see "First-time setup" below).
# Until they're added, this workflow runs but every job after
# `check-secrets-configured` is skipped — pushes to main don't fail CI,
# they just don't deploy, which is the right default for a repo where
# staging infrastructure may not exist yet (infra/terraform/README.md:
# "this has never been applied against a real AWS account").

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false # never cancel a deploy that's already pushing an image mid-flight

env:
  NODE_VERSION: '20.11.0'
  PNPM_VERSION: '9.12.0'
  AWS_REGION: 'ap-south-1'
  ECR_REPOSITORY: 'voai-api-server'

jobs:
  # Lets every later job use `if: needs.check-secrets-configured.outputs.ready == 'true'`
  # instead of repeating the same long secrets-presence check everywhere.
  check-secrets-configured:
    name: Check deploy secrets are configured
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ] && [ -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY repository secrets are not set — skipping deploy. See infra/terraform/README.md and this workflow's header comment."
          fi

  verify:
    name: Build, typecheck, test
    needs: check-secrets-configured
    if: needs.check-secrets-configured.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run test
      # Deliberately not running test:integration here — it needs the
      # live Docker Compose stack (Postgres/Neo4j/Redis/MinIO), which
      # this runner doesn't have. ci.yml already covers the unit suite
      # on every push/PR; this job re-runs it specifically as the deploy
      # gate so a deploy never ships on top of an unverified commit, even
      # if ci.yml's status for some reason wasn't checked.

  build-and-push:
    name: Build and push image to ECR
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        id: build
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY"
          docker build -f apps/api-server/Dockerfile -t "$IMAGE_URI:$IMAGE_TAG" -t "$IMAGE_URI:latest" .
          docker push "$IMAGE_URI:$IMAGE_TAG"
          docker push "$IMAGE_URI:latest"
          echo "image_uri=$IMAGE_URI:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  deploy-to-ecs:
    name: Force a new ECS deployment and wait for it to stabilize
    # ECS does not watch ECR for new image digests the way App Runner's
    # auto_deployments_enabled did (ADR 012's 2026-06-29 amendment — App
    # Runner was replaced by ECS Fargate after it turned out to be closed
    # to new AWS customers). Pushing a new :latest image is not enough on
    # its own; the service needs an explicit forced redeployment to pick
    # it up.
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      ECS_CLUSTER: voai-staging
      ECS_SERVICE: voai-staging-api-server
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new deployment
        run: |
          if ! aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" --query "services[0].serviceName" --output text 2>/dev/null | grep -q "$ECS_SERVICE"; then
            echo "::warning::ECS service not found — has terraform apply run yet? Image was pushed to ECR regardless (${{ needs.build-and-push.outputs.image_uri }})."
            exit 0
          fi
          aws ecs update-service --cluster "$ECS_CLUSTER" --service "$ECS_SERVICE" --force-new-deployment > /dev/null
          echo "Waiting for the new deployment to stabilize (aws ecs wait services-stable)..."
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE"
          echo "Deployment stable."
